<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer.io → HTML Converter</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #7c5cfc;
      --accent2: #00e5b0;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --error: #ff4d6d;
      --success: #00e5b0;
      --radius: 10px;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
    }

    .logo-badge {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    header h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    .badge {
      margin-left: auto;
      font-size: 11px;
      font-family: var(--mono);
      background: rgba(124,92,252,0.15);
      color: var(--accent);
      border: 1px solid rgba(124,92,252,0.3);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto 1fr;
      gap: 0;
      height: calc(100vh - 73px);
    }

    /* ── META BAR ── */
    .meta-bar {
      grid-column: 1 / -1;
      display: flex;
      align-items: stretch;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }

    .meta-field {
      display: flex;
      align-items: center;
      flex: 1;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .meta-field:last-child { border-right: none; }

    .meta-label {
      flex-shrink: 0;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 14px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 7px;
      border-right: 1px solid var(--border);
      height: 100%;
      background: var(--surface);
    }

    .meta-label .tag {
      font-size: 10px;
      background: rgba(124,92,252,0.12);
      color: var(--accent);
      border: 1px solid rgba(124,92,252,0.25);
      padding: 1px 7px;
      border-radius: 4px;
      font-family: var(--mono);
    }

    .meta-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12.5px;
      padding: 10px 16px;
      min-width: 0;
    }

    .meta-input::placeholder { color: var(--border); }

    /* ── TOOLBAR ── */
    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: #6a4de0; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    .btn-success {
      background: rgba(0,229,176,0.15);
      color: var(--accent2);
      border: 1px solid rgba(0,229,176,0.3);
    }
    .btn-success:hover { background: rgba(0,229,176,0.25); }

    .btn-icon {
      padding: 7px 10px;
      font-size: 15px;
    }

    .spacer { flex: 1; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.ready { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error { background: var(--error); box-shadow: 0 0 6px var(--error); }

    #status-text {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
    }

    /* ── PANELS ── */
    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .panel-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .dot-input { background: #f4c430; }
    .dot-output { background: var(--accent2); }

    .panel-header .line-count {
      margin-left: auto;
      font-size: 10px;
      color: var(--border);
    }

    textarea, #output-area {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 20px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.7;
      tab-size: 2;
      overflow: auto;
    }

    textarea {
      background: var(--bg);
      color: var(--text);
      caret-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--border);
    }

    #output-area {
      background: #0a0a0c;
      color: #a8d8a8;
      white-space: pre;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--border);
      background: #0a0a0c;
      padding: 40px;
      text-align: center;
    }

    .empty-state .icon { font-size: 40px; opacity: 0.4; }
    .empty-state p { font-size: 13px; font-family: var(--mono); line-height: 1.6; }
    .empty-state strong { color: var(--muted); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 12px 20px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(0,229,176,0.4); }
    .toast.error-toast { border-color: rgba(255,77,109,0.4); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── PREVIEW MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 90vw;
      max-width: 680px;
      height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .modal-header span { font-size: 13px; font-weight: 600; }
    .modal-header .close-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .modal-header .close-btn:hover { color: var(--text); background: var(--border); }

    .modal iframe {
      flex: 1;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-badge">⚡</div>
    <h1>Customer.io <span>→</span> HTML Converter</h1>
    <div class="badge">v1.0</div>
  </header>

  <main>
    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-group">
        <button class="btn btn-primary" onclick="convert()">
          <span>▶</span> Converter
        </button>
        <button class="btn btn-ghost" onclick="clearAll()">Limpar</button>
      </div>

      <div class="toolbar-group" style="margin-left: 16px;">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Aguardando código...</span>
      </div>

      <div class="spacer"></div>

      <div class="toolbar-group">
        <button class="btn btn-ghost btn-icon" title="Preview" onclick="openPreview()">👁</button>
        <button class="btn btn-success" onclick="copyOutput()">
          <span>⎘</span> Copiar HTML
        </button>
        <button class="btn btn-ghost" onclick="downloadOutput()">⬇ Download</button>
      </div>
    </div>

    <!-- META BAR -->
    <div class="meta-bar">
      <div class="meta-field">
        <label class="meta-label" for="meta-title">
          Title
          <span class="tag">&lt;title&gt;</span>
        </label>
        <input
          class="meta-input"
          id="meta-title"
          type="text"
          placeholder="Título do email (ex: Verisure – Oferta especial)"
          spellcheck="false"
        />
      </div>
      <div class="meta-field">
        <label class="meta-label" for="meta-preheader">
          Preheader
          <span class="tag">.preheader</span>
        </label>
        <input
          class="meta-input"
          id="meta-preheader"
          type="text"
          placeholder="Texto de pré-cabeçalho exibido nos clientes de email..."
          spellcheck="false"
        />
      </div>
    </div>

    <!-- INPUT PANEL -->
    <div class="panel">
      <div class="panel-header">
        <span class="dot dot-input"></span>
        Código Fonte (Customer.io)
        <span class="line-count" id="input-lines">0 linhas</span>
      </div>
      <textarea
        id="input"
        placeholder="Cole aqui o código do Customer.io com elementos x-base, x-section, x-row, x-column, x-image, x-heading-2, x-paragraph, x-cta..."
        spellcheck="false"
        oninput="updateLineCount()"
      ></textarea>
    </div>

    <!-- OUTPUT PANEL -->
    <div class="panel">
      <div class="panel-header">
        <span class="dot dot-output"></span>
        HTML Gerado
        <span class="line-count" id="output-lines">0 linhas</span>
      </div>
      <div id="output-empty" class="empty-state">
        <div class="icon">✦</div>
        <p>O HTML convertido<br>aparecerá aqui.<br><br><strong>Cole o código ao lado<br>e clique em Converter.</strong></p>
      </div>
      <pre id="output-area" style="display:none;"></pre>
    </div>
  </main>

  <!-- PREVIEW MODAL -->
  <div class="modal-overlay" id="preview-modal">
    <div class="modal">
      <div class="modal-header">
        <span>👁 Preview do Email</span>
        <button class="close-btn" onclick="closePreview()">✕</button>
      </div>
      <iframe id="preview-frame"></iframe>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ─────────────────────────────────────────────
    //  UTILITIES
    // ─────────────────────────────────────────────

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
      t.className = 'toast show ' + (type === 'success' ? 'success' : 'error-toast');
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.className = 'toast'; }, 2500);
    }

    function setStatus(text, state = '') {
      document.getElementById('status-text').textContent = text;
      const dot = document.getElementById('status-dot');
      dot.className = 'status-dot' + (state ? ' ' + state : '');
    }

    function updateLineCount() {
      const val = document.getElementById('input').value;
      const lines = val ? val.split('\n').length : 0;
      document.getElementById('input-lines').textContent = lines + ' linhas';
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('meta-title').value = '';
      document.getElementById('meta-preheader').value = '';
      document.getElementById('output-area').style.display = 'none';
      document.getElementById('output-empty').style.display = 'flex';
      document.getElementById('output-lines').textContent = '0 linhas';
      document.getElementById('input-lines').textContent = '0 linhas';
      setStatus('Aguardando código...');
    }

    // ─────────────────────────────────────────────
    //  CONVERTER ENGINE
    // ─────────────────────────────────────────────

    function resolveAttr(val) {
      // Resolve dynamic bindings like :color="globalStyles.colors.neutral100..." → #ffffff
      if (!val) return val;
      if (val.includes('neutral100')) return '#ffffff';
      if (val.includes('Component.utils.background')) {
        // Extract color arg if present
        const m = val.match(/globalStyles\.colors\.(\w+)/);
        if (m && m[1].includes('neutral100')) return '#ffffff';
        return '#ffffff';
      }
      return val;
    }

    function parseAttrs(tag) {
      const attrs = {};
      // Match both regular attr="val" and :attr="val" and :attr='val'
      const re = /(:?[\w-]+)=(?:"([^"]*)"|'([^']*)')/g;
      let m;
      while ((m = re.exec(tag)) !== null) {
        let key = m[1];
        let val = m[2] !== undefined ? m[2] : m[3];
        // Strip leading :
        const isDynamic = key.startsWith(':');
        if (isDynamic) key = key.slice(1);
        // Resolve dynamic values
        val = resolveAttr(val);
        // Remove quotes from numeric-looking dynamic bindings
        if (isDynamic && /^\d+$/.test(val.trim())) val = val.trim();
        attrs[key] = val;
      }
      return attrs;
    }

    function attr(obj, key, fallback = '') {
      return obj[key] !== undefined ? obj[key] : fallback;
    }

    function buildCTA(attrs, indent = '') {
      const bg = attr(attrs, 'background', '#ed002f');
      const align = attr(attrs, 'align', 'center');
      const br = attr(attrs, 'border-radius', '90px');
      const ff = attr(attrs, 'font-family', "'Fira Sans', sans-serif");
      const fw = attr(attrs, 'font-weight', '700');
      return `${indent}<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin: 16px ${align === 'center' ? 'auto' : align === 'left' ? '0 auto 0 0' : '0 0 0 auto'};">
${indent}  <tr>
${indent}    <td align="${align}" style="border-radius:${br}; background-color:${bg};">
${indent}      <a href="#" style="display:inline-block; padding:13px 26px; font-family:${ff}; font-size:14px; font-weight:${fw}; color:#ffffff; text-decoration:none; border-radius:${br};">__CTA_CONTENT__</a>
${indent}    </td>
${indent}  </tr>
${indent}</table>`;
    }

    function convert() {
      const raw = document.getElementById('input').value.trim();
      if (!raw) { showToast('Cole o código antes de converter.', 'error'); return; }

      try {
        const html = convertCode(raw);
        const lines = html.split('\n').length;
        document.getElementById('output-area').textContent = html;
        document.getElementById('output-area').style.display = 'block';
        document.getElementById('output-empty').style.display = 'none';
        document.getElementById('output-lines').textContent = lines + ' linhas';
        setStatus('Conversão concluída — ' + lines + ' linhas geradas', 'ready');
        showToast('HTML gerado com sucesso!');
      } catch(e) {
        setStatus('Erro na conversão', 'error');
        showToast('Erro: ' + e.message, 'error');
        console.error(e);
      }
    }

    function convertCode(raw) {
      // ── 1. Parse the DOM-like structure using regex-based tokenizer
      const sections = [];

      // Remove x-base wrapper
      let code = raw.replace(/<x-base[^>]*>/gi, '').replace(/<\/x-base>/gi, '').trim();

      // Split into x-section blocks
      const sectionRe = /<x-section([\s\S]*?)>([\s\S]*?)<\/x-section>/gi;
      let match;
      while ((match = sectionRe.exec(code)) !== null) {
        sections.push({ attrStr: match[1], inner: match[2] });
      }

      const sectionHtmls = sections.map((sec, i) => convertSection(sec, i));

      const title = document.getElementById('meta-title').value.trim();
      const preheader = document.getElementById('meta-preheader').value.trim();

      return buildEmailWrapper(sectionHtmls, title, preheader);
    }

    function convertSection({ attrStr, inner }, idx) {
      const attrs = parseAttrs(attrStr);
      const width = attr(attrs, 'width', '600').replace('px','');
      const outerBg = attr(attrs, 'outer-background', '#f6f6f6');
      const bg = resolveAttr(attr(attrs, 'background', '#ffffff'));
      const padding = attr(attrs, 'padding', '');
      const align = attr(attrs, 'align', '');
      const ff = attr(attrs, 'font-family', '');

      const paddingStyle = padding ? `padding:${padding};` : 'padding: 20px 24px;';

      const innerHtml = convertInner(inner.trim(), ff);

      return `        <!-- SECTION ${idx + 1} -->
        <table role="presentation" class="email-wrapper" width="${width}" cellpadding="0" cellspacing="0" border="0" style="background-color:${bg};">
          <tr>
            <td${align ? ` align="${align}"` : ''} style="${paddingStyle}">
${innerHtml}
            </td>
          </tr>
        </table>`;
    }

    function convertInner(inner, parentFF = '') {
      // Handle x-row (2-column layout)
      if (/<x-row/i.test(inner)) {
        return convertRow(inner, parentFF);
      }

      // Otherwise convert inline elements
      return convertElements(inner, '              ', parentFF);
    }

    function convertRow(inner, parentFF) {
      const colRe = /<x-column([\s\S]*?)>([\s\S]*?)<\/x-column>/gi;
      const cols = [];
      let m;
      while ((m = colRe.exec(inner)) !== null) {
        cols.push({ attrStr: m[1], inner: m[2] });
      }

      if (cols.length === 0) return '';

      const colsHtml = cols.map((col, i) => {
        const cAttrs = parseAttrs(col.attrStr);
        const vAlign = attr(cAttrs, 'vertical-align', 'top');
        const padding = attr(cAttrs, 'padding', '0');
        const width = Math.floor(600 / cols.length);
        const content = convertElements(col.inner.trim(), '                ', parentFF);
        return `              <td class="two-col-${i === 0 ? 'left' : 'right'}" valign="${vAlign}" width="${width}" style="padding:${padding};">
${content}
              </td>`;
      }).join('\n');

      return `            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
              <tr>
${colsHtml}
              </tr>
            </table>`;
    }

    function convertElements(html, indent, parentFF = '') {
      const parts = [];

      // Process each known element
      const tagRe = /<(x-[\w-]+)([\s\S]*?)>([\s\S]*?)<\/\1>|<(x-image)([\s\S]*?)\/>/gi;
      let last = 0, m;

      // Use a simpler sequential approach
      let remaining = html;

      // Replace x-heading-2
      remaining = remaining.replace(/<x-heading-2([\s\S]*?)>([\s\S]*?)<\/x-heading-2>/gi, (_, attrStr, content) => {
        const a = parseAttrs(attrStr);
        const color = attr(a, 'color', '#000000');
        const fs = attr(a, 'font-size', '22');
        const fw = attr(a, 'font-weight', '700');
        const ff = attr(a, 'font-family', parentFF || "'Fira Sans', sans-serif");
        const lh = attr(a, 'line-height', '1.3');
        const ta = attr(a, 'text-align', 'left');
        return `${indent}<h2 style="margin:0 0 12px 0; font-family:${ff}; font-size:${fs}px; font-weight:${fw}; line-height:${lh}; color:${color}; text-align:${ta};">${content.trim()}</h2>`;
      });

      // Replace x-paragraph
      remaining = remaining.replace(/<x-paragraph([\s\S]*?)>([\s\S]*?)<\/x-paragraph>/gi, (_, attrStr, content) => {
        const a = parseAttrs(attrStr);
        const color = attr(a, 'color', '#000000');
        const fs = attr(a, 'font-size', '15');
        const fw = attr(a, 'font-weight', '400');
        const ff = attr(a, 'font-family', parentFF || "'Fira Sans', sans-serif");
        const ta = attr(a, 'text-align', 'left');
        return `${indent}<p style="margin:0 0 12px 0; font-family:${ff}; font-size:${fs}px; font-weight:${fw}; color:${color}; line-height:1.5; text-align:${ta};">${content.trim()}</p>`;
      });

      // Replace x-cta
      remaining = remaining.replace(/<x-cta([\s\S]*?)>([\s\S]*?)<\/x-cta>/gi, (_, attrStr, ctaContent) => {
        const a = parseAttrs(attrStr);
        const ctaHtml = buildCTA(a, indent).replace('__CTA_CONTENT__', ctaContent.trim());
        return ctaHtml;
      });

      // Replace x-image (self-closing)
      remaining = remaining.replace(/<x-image([\s\S]*?)\/>/gi, (_, attrStr) => {
        const a = parseAttrs(attrStr);
        const src = attr(a, 'src', '');
        const alt = attr(a, 'alt', '');
        const width = attr(a, 'width', '').replace('px','') || '100%';
        const align = attr(a, 'align', 'left');
        const widthAttr = /^\d+$/.test(width) ? `width="${width}"` : '';
        const displayStyle = align === 'center' ? 'display:block; margin:0 auto;' : 'display:block;';
        return `${indent}<img src="${src}" alt="${alt}" ${widthAttr} style="${displayStyle} max-width:100%;" />`;
      });

      // Clean up leftover blank lines
      remaining = remaining.replace(/\n{3,}/g, '\n\n').trim();

      return remaining;
    }

    function buildEmailWrapper(sectionHtmls, title, preheader) {
      const titleTag = title ? title : 'Email';
      const preheaderTag = preheader
        ? `\n  <span class="preheader">${preheader}</span>` : '';

      return `<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>${titleTag}</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; display: block; }
    body { margin: 0; padding: 0; background-color: #f6f6f6; font-family: 'Fira Sans', sans-serif; }
    a { color: inherit; text-decoration: none; }
    .preheader { display:none !important; visibility:hidden; opacity:0; height:0; width:0; }
    @media only screen and (max-width: 600px) {
      .email-wrapper { width: 100% !important; }
      .two-col-left, .two-col-right { display: block !important; width: 100% !important; }
      .two-col-left img, .two-col-right img { width: 100% !important; max-width: 100% !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background-color:#f6f6f6;">${preheaderTag}

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f6f6f6;">
    <tr>
      <td align="center">

${sectionHtmls.join('\n\n')}

      </td>
    </tr>
  </table>

</body>
</html>`;
    }

    // ─────────────────────────────────────────────
    //  COPY / DOWNLOAD / PREVIEW
    // ─────────────────────────────────────────────

    function copyOutput() {
      const out = document.getElementById('output-area').textContent;
      if (!out) { showToast('Nada para copiar ainda.', 'error'); return; }
      navigator.clipboard.writeText(out).then(() => showToast('HTML copiado para a área de transferência!'));
    }

    function downloadOutput() {
      const out = document.getElementById('output-area').textContent;
      if (!out) { showToast('Nada para baixar ainda.', 'error'); return; }
      const blob = new Blob([out], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'email-converted.html';
      a.click();
      showToast('Download iniciado!');
    }

    function openPreview() {
      const out = document.getElementById('output-area').textContent;
      if (!out) { showToast('Converta o código primeiro.', 'error'); return; }
      const iframe = document.getElementById('preview-frame');
      iframe.srcdoc = out;
      document.getElementById('preview-modal').classList.add('open');
    }

    function closePreview() {
      document.getElementById('preview-modal').classList.remove('open');
    }

    // Close modal on overlay click
    document.getElementById('preview-modal').addEventListener('click', function(e) {
      if (e.target === this) closePreview();
    });

    // Keyboard shortcut: Ctrl+Enter to convert
    document.getElementById('input').addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') convert();
    });
  </script>
</body>
</html>
